name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Astro check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  config-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Audit Cursor config
        run: node --experimental-strip-types scripts/audit-cursor-config.mts --root . --fail-on-critical
